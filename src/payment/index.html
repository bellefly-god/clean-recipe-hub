<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Cleaner - Payment</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 16px;
        padding: 32px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        text-align: center;
      }
      h1 { font-size: 24px; margin-bottom: 8px; color: #333; }
      .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
      .plan { background: #f9f9f9; padding: 16px; border-radius: 12px; margin-bottom: 20px; }
      .plan-name { font-weight: 600; font-size: 18px; color: #333; }
      .plan-price { font-size: 32px; font-weight: 700; color: #0070ba; margin: 8px 0; }
      .plan-period { color: #666; font-size: 14px; }
      #paypal-button { min-height: 45px; }
      .loading { color: #666; padding: 20px; }
      .error { color: #dc3545; padding: 16px; background: #fee; border-radius: 8px; margin-top: 16px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Recipe Cleaner</h1>
      <p class="subtitle">Unlock unlimited access</p>

      <div class="plan">
        <div class="plan-name" id="plan-name">Pro Monthly</div>
        <div class="plan-price" id="plan-price">$3.99</div>
        <div class="plan-period">per month</div>
      </div>

      <div id="paypal-button"></div>
      <div id="status" class="loading">Loading payment...</div>
    </div>

    <script type="module" src="./payment.ts"></script>
  </body>
</html>
