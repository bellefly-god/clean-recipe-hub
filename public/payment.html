<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Cleaner - Payment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }
    h1 { font-size: 24px; margin-bottom: 4px; color: #333; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
    .plan { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); padding: 24px; border-radius: 16px; margin-bottom: 24px; }
    .plan-name { font-weight: 700; font-size: 20px; color: #333; }
    .plan-price { font-size: 48px; font-weight: 800; color: #0070ba; margin: 12px 0; }
    .plan-period { color: #666; font-size: 14px; }
    .features { text-align: left; margin: 20px 0; }
    .feature { padding: 8px 0; color: #555; font-size: 14px; }
    .feature::before { content: "✓"; color: #10b981; margin-right: 8px; font-weight: bold; }
    #paypal-button { min-height: 50px; margin: 20px 0; }
    .loading { color: #666; padding: 20px; font-size: 14px; }
    .error { color: #dc3545; padding: 16px; background: #fee; border-radius: 8px; margin-top: 16px; font-size: 14px; }
    .success { color: #10b981; padding: 16px; background: #e6f7ef; border-radius: 8px; margin-top: 16px; font-size: 14px; }
    .footer { margin-top: 20px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🧹</div>
    <h1>Page Cleaner</h1>
    <p class="subtitle">Unlock unlimited access</p>

    <div class="plan">
      <div class="plan-name" id="plan-name">Pro Monthly</div>
      <div class="plan-price" id="plan-price">$3.99</div>
      <div class="plan-period" id="plan-period">per month</div>
    </div>

    <div class="features">
      <div class="feature">Unlimited page cleanings</div>
      <div class="feature">Unlimited AI summaries</div>
      <div class="feature">All page types supported</div>
      <div class="feature">Priority support</div>
    </div>

    <div id="paypal-button"></div>
    <div id="status" class="loading">Loading payment options...</div>

    <div class="footer">
      Secure payment powered by PayPal
    </div>
  </div>

  <script>
    // Get config from URL or use defaults
    const CONFIG_URL = 'https://clean-hub.ariflim813.workers.dev/';

    const params = new URLSearchParams(window.location.search);
    const planId = params.get('plan') || 'monthly';
    const userId = params.get('userId') || '';
    const userEmail = params.get('email') || '';
    const returnUrl = params.get('returnUrl') || window.location.origin + window.location.pathname;

    const plans = {
      monthly: { name: 'Pro Monthly', price: '$3.99', period: 'per month' },
      yearly: { name: 'Pro Yearly', price: '$29.9', period: 'per year' }
    };

    const plan = plans[planId] || plans.monthly;

    // Update UI
    document.getElementById('plan-name').textContent = plan.name;
    document.getElementById('plan-price').textContent = plan.price;
    document.getElementById('plan-period').textContent = plan.period;

    // Fetch config and load PayPal
    fetch(CONFIG_URL)
      .then(r => r.json())
      .then(config => {
        const clientId = config.paypal.clientId;
        const paypalPlanId = config.paypal.plans[planId];

        if (!clientId || !paypalPlanId) {
          document.getElementById('status').innerHTML = '<div class="error">Configuration error. Please contact support.</div>';
          return;
        }

        const baseUrl = config.paypal.environment === 'sandbox'
          ? 'https://www.sandbox.paypal.com'
          : 'https://www.paypal.com';

        // Load PayPal SDK
        const script = document.createElement('script');
        script.src = `${baseUrl}/sdk/js?client-id=${clientId}&intent=subscription&vault=true&currency=USD`;
        script.async = true;
        script.onload = () => {
          document.getElementById('status').style.display = 'none';

          window.paypal.Buttons({
            style: {
              layout: 'vertical',
              color: 'gold',
              shape: 'rect',
              label: 'paypal',
              height: 50
            },
            createSubscription: function(data, actions) {
              return actions.subscription.create({
                plan_id: paypalPlanId
              });
            },
            onApprove: function(data, actions) {
              document.getElementById('status').innerHTML = '<div class="loading">Processing your subscription...</div>';
              document.getElementById('status').style.display = 'block';

              // Send message to extension
              if (typeof chrome !== 'undefined' && chrome.runtime) {
                chrome.runtime.sendMessage({
                  type: 'PAYPAL_SUBSCRIPTION_COMPLETE',
                  subscriptionId: data.subscriptionID,
                  userId: userId,
                  userEmail: userEmail,
                  planId: planId
                }, response => {
                  if (response && response.success) {
                    document.getElementById('status').innerHTML =
                      '<div class="success">✓ Payment successful!<br><br>You can close this tab and return to the extension.</div>';
                  } else {
                    document.getElementById('status').innerHTML =
                      '<div class="error">Payment received but failed to activate. Please contact support with ID: ' + data.subscriptionID + '</div>';
                  }
                });
              } else {
                // Not in extension context
                document.getElementById('status').innerHTML =
                  '<div class="success">✓ Payment successful!<br><br>Subscription ID: ' + data.subscriptionID + '<br><br>Please return to the extension.</div>';
              }
            },
            onCancel: function() {
              document.getElementById('status').textContent = 'Payment was cancelled.';
              document.getElementById('status').style.display = 'block';
            },
            onError: function(err) {
              console.error('PayPal error:', err);
              document.getElementById('status').innerHTML =
                '<div class="error">Payment failed. Please try again or contact support.</div>';
            }
          }).render('#paypal-button');
        };
        script.onerror = () => {
          document.getElementById('status').innerHTML =
            '<div class="error">Failed to load PayPal. Please check your internet connection and try again.</div>';
        };
        document.head.appendChild(script);
      })
      .catch(err => {
        console.error('Config fetch error:', err);
        document.getElementById('status').innerHTML =
          '<div class="error">Failed to load configuration. Please refresh the page.</div>';
      });
  </script>
</body>
</html>
